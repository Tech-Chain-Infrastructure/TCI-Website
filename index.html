body, html {
    margin: 0;
    padding: 0;
    font-family: 'Source Sans 3';
    background-image: url("IMGS/background.jpg" );
    background-repeat: no-repeat;
    background-color: rgb(255, 255, 255);
}

nav {
    width: 100%;
    background-color: #000000;
    color: white;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: flex-start; 
}

nav img {
    width: 110px;
    height: 80px;
    padding-left: 70px;
    padding-right: 120px;
    object-fit: contain; 
}

nav a {
    position: relative;
    font-family: 'Source Sans 3';
    color: white;
    text-decoration: none;
    font-weight: 700;
    font-size: 20px;
    padding-left: 35px;
    padding-right: 35px;
    display: flex;
    align-items: center;
    height: 100%;
}


nav a:not(:first-child)::before {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 50%;
    background-color: white; 
    transition: all 0.3s ease-in-out; 
}


nav a:hover::before {
    width: 100%;
    left: 0;
}


.head {
    justify-self: center;
    margin-top: 120px;
    align-items: center;
    display: grid;
    place-items: center;
}

h1 {
    font-size: 50px;
}

        .card-container {
            margin: 200px 50px 100px;
            display: flex;
            gap: 50px;
            justify-content: center; 
           
        }
        .card {
            border: 1px solid #00000042;
            border-radius: 15px;
            overflow: hidden;
            width: 500px;
            text-align: center;
            background-color: #ffffff;
            text-decoration: dashed rgb(0, 0, 0) 3px;
           
        }
        .card img {
            width: 100%;
            height: auto;
            transition: transform 0.3s ease-in-out;;
        }
        .card-title {
            font-size: 1.2em;
            margin: 10px 0;
            cursor: pointer;
            transition: text-decoration 0.3s ease;  
               color: rgb(0, 0, 0);
            text-decoration: dashed underline rgb(15, 15, 38) 3px;
            font-family: 'Source Sans 3';
            font-weight: 700;
        }
        .card-title:hover {
            text-decoration: none; 
        }
        .card img:hover {
            transform: scale(1.1);
        }
        
       
        footer {
            background-color: #000000;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        footer a {
            color: #ccc;
            text-decoration: none;
            margin: 0 10px;
        }
        footer a:hover {
            color: white;
        }
        footer p {
            margin: 10px 0 0;
        }
  

        h2 {
            margin-left: 100px;
        }
        .sub-header { 
            font-size: 18px;
